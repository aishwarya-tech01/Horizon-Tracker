<!DOCTYPE html>
<html>
<head>
    <title>Horizon Tracker</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; padding: 40px; }
        .summary { background: #333; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .card { background: #1e1e1e; padding: 15px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; }
        .alert { border-left: 5px solid red; }
        input { padding: 10px; border-radius: 4px; border: none; width: 170px; }
        button { padding: 10px; background: #ff9800; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🌅 Horizon Tracker</h1>
    
    <div class="summary">
        <h3>Total Expected Salary (Offered): ₹{{ total_offered }}</h3>
    </div>

    <form action="/add" method="POST">
        <input type="text" name="company" placeholder="Company" required>
        <input type="text" name="title" placeholder="Job Title" required>
        <input type="number" name="salary" placeholder="Salary (₹ per annum)">
        <button type="submit">Add Job</button>
    </form>
    
    {% for job in jobs %}
    <div class="card {% if job.status == 'Applied' %}alert{% endif %}">
        <strong>{{ job.company }}</strong> - {{ job.title }} <br>
        <small>Status: {{ job.status }} | Salary: ₹{{ job.salary }} (per annum)</small><br>
        <a href="/update/{{ job.id }}/Interviewing" style="color:yellow">Mark Interviewing</a> | 
        <a href="/update/{{ job.id }}/Offered" style="color:green">Mark Offered</a> |
        <a href="/delete/{{ job.id }}" style="color:red">Delete</a>
    </div>
    {% endfor %}
</body>
</html>
