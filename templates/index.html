<!DOCTYPE html>
<html>
<head>
    <title>Horizon Tracker</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; padding: 40px; }
        .card { background: #1e1e1e; padding: 15px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; }
        .alert { border-left: 5px solid red; } /* Red flag for applied jobs */
        input { padding: 10px; border-radius: 4px; border: none; }
        button { padding: 10px; background: #ff9800; border: none; border-radius: 4px; cursor: pointer; }
        .btn-del { background: #f44336; color: white; text-decoration: none; padding: 5px 10px; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>🌅 Horizon Tracker</h1>
    <form action="/add" method="POST">
        <input type="text" name="company" placeholder="Company Name" required>
        <input type="text" name="title" placeholder="Job Title" required>
        <button type="submit">Add Job</button>
    </form>
    
    {% for job in jobs %}
    <div class="card {% if job.status == 'Applied' %}alert{% endif %}">
        <strong>{{ job.company }}</strong> - {{ job.title }} <br>
        <small>Status: {{ job.status }}</small><br>
        <a href="/update/{{ job.id }}">Mark Interviewing</a> | 
        <a href="/delete/{{ job.id }}" class="btn-del">Delete</a>
    </div>
    {% endfor %}
</body>
</html>
